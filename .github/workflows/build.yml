name: Build Electron App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:electron
        env:
          ELECTRON: 'true'

      - uses: actions/upload-artifact@v4
        with:
          name: BswMViewer-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            dist/release/*.exe
            dist/release/*.AppImage
          if-no-files-found: warn
